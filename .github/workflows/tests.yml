name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint (syntax errors and undefined names only)
        run: uvx ruff check src/opportunity_os --select E9,F63,F7,F82

      # pytest collects via testpaths in pyproject.toml (src/opportunity_os)
      - name: Run tests
        run: uv run pytest -q --tb=short
