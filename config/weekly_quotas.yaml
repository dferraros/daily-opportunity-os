# Weekly operating quotas — machine is not working if these don't ship
weekly_quotas:
  signals_ingested:
    target: 40
    minimum: 30
    maximum: 50
    recovery_action: "Run signal-harvester twice more this week"

  structured_opportunities:
    target: 10
    minimum: 7
    recovery_action: "Lower signal threshold, accept medium-confidence signals"

  deep_dives_produced:
    target: 3
    minimum: 1
    recovery_action: "Promote top 2 scouts to deep-dive-builder this week"

  validations_run:
    target: 2
    minimum: 1
    recovery_action: "Run validation-runner on top 2 opportunities from weekly review"

  build_candidates_promoted:
    # One every 2-4 weeks is healthy
    target_monthly: 2
    minimum_monthly: 1
    recovery_action: "If no build candidates in 4 weeks, lower score threshold for promotion"

  # Kill ratios — system is too permissive if kill rate < 15%
  kill_rate_target_pct: 25
  kill_rate_minimum_pct: 15
