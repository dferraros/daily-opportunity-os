# Sources scanned during daily signal harvest
# Format: name, url_pattern, frequency, geo_focus, vertical_focus

global:
  - name: Hacker News (Show HN + Ask HN)
    search_queries: ["launch", "startup", "product", "side project"]
    frequency: daily
  - name: ProductHunt
    search_queries: ["new product launches", "top products today"]
    frequency: daily
  - name: Reddit
    subreddits: ["entrepreneur", "startups", "SaaS", "smallbusiness", "Entrepreneur"]
    frequency: daily
  - name: GitHub Trending
    search_queries: ["trending repositories", "new tools"]
    frequency: weekly
  - name: Crunchbase/TechCrunch
    search_queries: ["funding announcement", "acquisition", "new startup"]
    frequency: daily
  - name: App Store / Play Store reviews
    search_queries: ["complaints", "missing features", "alternative"]
    frequency: weekly

latam:
  - name: LAVCA (Latin America VC)
    frequency: weekly
  - name: Contxto (LATAM tech news)
    frequency: daily
  - name: TechCrunch LATAM
    frequency: daily
  - name: iupana (fintech LATAM)
    frequency: weekly
  - name: Failory LATAM failures
    frequency: monthly

venezuela:
  - name: Efecto Cocuyo
    frequency: daily
    focus: [business, economy, technology]
  - name: El Pitazo Economy
    frequency: daily
    focus: [SMB, informal commerce, payments]
  - name: Venezuela social media (X, TikTok, Instagram)
    search_queries: ["dolor", "problema", "necesito", "quiero", "no hay", "falta"]
    frequency: daily
  - name: Venezuelan diaspora communities (Reddit, Facebook groups)
    search_queries: ["need help with", "looking for", "does anyone", "how do you"]
    frequency: weekly
  - name: IESA business news Venezuela
    frequency: weekly
