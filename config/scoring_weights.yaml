# Scoring weights — must sum to 1.0
# Edit to adjust what matters most for your investment thesis
weights:
  market_size: 0.10
  timing_tailwind: 0.08
  pain_severity: 0.10
  willingness_to_pay: 0.08
  monetization_clarity: 0.08
  pain_validation_score: 0.08  # from execute_pain_research; absent = neutral
  speed_to_mvp: 0.08
  capital_efficiency: 0.07
  distribution_accessibility: 0.08
  distribution_quality: 0.07   # derived from distribution_validated bool; absent = neutral
  competition_intensity: 0.07   # inverted: lower competition → higher score
  defensibility: 0.07
  regional_fit: 0.07
  founder_fit: 0.05
  ai_leverage: 0.04
  operational_simplicity: 0.05
  regulatory_simplicity: 0.04
  revenue_speed_score: 0.04

# Bonus modifiers applied after base score
modifiers:
  venezuela_wedge_match: +1.5  # added to regional_fit when wedge category matches
  daniels_wedge_low: -1.0      # subtracted when < 2 of Daniel's 6 wedges match
  non_obviousness_high: +0.5   # added when non_obviousness_score >= 6

# Hard caps
caps:
  kill_decision_true: 0.0        # killed opportunities score 0 regardless
  decision_filter_2_failed: 5.0  # capped at 5.0 if 2+ decision filters fail

# Promotion thresholds
thresholds:
  auto_validation: 7.0   # opps scoring >= this are auto-promoted in daily Step 14
