    signal_keywords: ["cobro", "pago", "USDT", "zelle", "binance"]
    urgency: critical

  remittances_and_diaspora_finance:
    description: "Sending money to/from Venezuela, diaspora financial products"
    signal_keywords: ["remesa", "envio", "diaspora", "bolivar", "USD familiar"]
